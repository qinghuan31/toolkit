# -*- coding: utf-8 -*-
name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # 允许创建/上传 release
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要 git tag 信息

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm toolkit.spec

      - name: Verify build
        run: |
          Get-ChildItem dist/
          $exe = Get-ChildItem dist/Toolkit_v*.exe -ErrorAction SilentlyContinue
          if (-not $exe) {
            Write-Error "Build failed: Toolkit_v*.exe not found"
            exit 1
          }
          Write-Host "Build verified: $($exe.Name) ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      # ============================================================
      # 关键修复:无论触发方式如何,都确保有一个 tag 可用
      # - push tag:直接用 $GITHUB_REF
      # - workflow_dispatch:创建一个 ci-build-<short-sha> 临时 tag
      # ============================================================
      - name: Ensure release tag exists
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Triggered by tag push, using: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch:创建临时 tag
            SHORT_SHA="${GITHUB_SHA::7}"
            TAG="ci-build-$SHORT_SHA"
            echo "Triggered by dispatch, creating temp tag: $TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Toolkit ${{ steps.tag.outputs.tag }}"
          # 自定义 body 而不是用 generate_release_notes=true
          # 因为自动生成的"Full Changelog"是 tag→tag 差异对比链接
          # 我们要的是直接到 commit 列表的链接(箭头指的位置)
          body: |
            ## Toolkit v${{ steps.tag.outputs.tag }} 自动构建

            **完整更新日志**: https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.tag }}

            ---

            ### 产物
            - `Toolkit_v*.exe` (单文件可执行,无需 Python 环境)

            ### 触发信息
            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - 触发: `${{ github.event_name }}`
            - 时间: ${{ github.event.head_commit.timestamp }}

            ### 验证
            - [ ] 下载 .exe
            - [ ] 双击启动
            - [ ] 侧边栏应显示 `peel_data` 标签
          draft: false
          prerelease: false
          files: |
            dist/Toolkit_v*.exe
            dist/README.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
