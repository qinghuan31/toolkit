# -*- coding: utf-8 -*-
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.5.0) - 仅用于日志展示,workflow_dispatch 不会自动创建 release 关联'
        required: false
        default: 'manual'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要 git tag 信息

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm toolkit.spec

      - name: Verify build
        run: |
          Get-ChildItem dist/
          $exe = Get-ChildItem dist/Toolkit_v*.exe -ErrorAction SilentlyContinue
          if (-not $exe) {
            Write-Error "Build failed: Toolkit_v*.exe not found"
            exit 1
          }
          Write-Host "Build verified: $($exe.Name) ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      - name: Detect tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # tag 触发:用 push 的 ref
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "MODE=tag" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch:用输入或当前 commit
            INPUT_TAG="${{ inputs.tag }}"
            if [ -z "$INPUT_TAG" ] || [ "$INPUT_TAG" = "manual" ]; then
              echo "TAG=" >> $GITHUB_OUTPUT
              echo "MODE=artifact" >> $GITHUB_OUTPUT
            else
              echo "TAG=$INPUT_TAG" >> $GITHUB_OUTPUT
              echo "MODE=tag" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload artifacts (no release)
        if: steps.tag.outputs.MODE == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: Toolkit-Windows
          path: |
            dist/Toolkit_v*.exe
            dist/README.txt
          if-no-files-found: error

      - name: Upload to release
        if: steps.tag.outputs.MODE == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          files: |
            dist/Toolkit_v*.exe
            dist/README.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
