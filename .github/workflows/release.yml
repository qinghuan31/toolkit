# -*- coding: utf-8 -*-
name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # 允许创建/上传 release
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要 git tag 信息

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm toolkit.spec

      - name: Verify build
        run: |
          Get-ChildItem dist/
          $exe = Get-ChildItem dist/Toolkit_v*.exe -ErrorAction SilentlyContinue
          if (-not $exe) {
            Write-Error "Build failed: Toolkit_v*.exe not found"
            exit 1
          }
          Write-Host "Build verified: $($exe.Name) ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      # ============================================================
      # 关键修复:无论触发方式如何,都确保有一个 tag 可用
      # - push tag:直接用 $GITHUB_REF
      # - workflow_dispatch:创建一个 ci-build-<short-sha> 临时 tag
      # ============================================================
      - name: Ensure release tag exists
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Triggered by tag push, using: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch:创建临时 tag
            SHORT_SHA="${GITHUB_SHA::7}"
            TAG="ci-build-$SHORT_SHA"
            echo "Triggered by dispatch, creating temp tag: $TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      # ============================================================
      # 自动生成详细 Release 正文：从 VERSION_LOG.md 解析
      # ============================================================
      - name: Generate release body
        id: body
        shell: pwsh
        run: |
          $VERSION_LOG = "plugins/peel_data/VERSION_LOG.md"
          if (-not (Test-Path $VERSION_LOG)) {
            Write-Warning "VERSION_LOG.md 不存在，使用精简 body"
            @"
          ## Toolkit ${{ steps.tag.outputs.tag }} 自动构建

          **完整更新日志**: https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.tag }}

          ### 产物
          - `Toolkit_v${{ steps.tag.outputs.tag }}.exe` (单文件可执行,无需 Python 环境)

          ### 触发信息
          - Commit: `${{ github.sha }}`
          - Tag: `${{ steps.tag.outputs.tag }}`
          - 时间: ${{ github.event.head_commit.timestamp }}
          "@ | Out-File -FilePath release_body.md -Encoding utf8
            exit 0
          }

          $content = Get-Content $VERSION_LOG -Raw -Encoding utf8

          # 用匹配到的 tag 版本号解析
          $versionTag = "${{ steps.tag.outputs.tag }}"
          $versionNumber = $versionTag -replace '^[vV]', ''
          Write-Host "Looking for version: [$versionNumber] in VERSION_LOG.md"

          $pattern = "(?ms)##\s*\[$([regex]::Escape($versionNumber))\]\s*-\s*(\S+).*?(?=##\s*\[|\z)"
          $match = [regex]::Match($content, $pattern)
          if (-not $match.Success) {
            Write-Warning "未在 VERSION_LOG.md 中找到版本 [$versionNumber]，使用精简 body"
            @"
          ## Toolkit ${{ steps.tag.outputs.tag }} 自动构建

          **完整更新日志**: https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.tag }}

          ### 产物
          - `Toolkit_v${{ steps.tag.outputs.tag }}.exe` (单文件可执行,无需 Python 环境)

          ### 触发信息
          - Commit: `${{ github.sha }}`
          - Tag: `${{ steps.tag.outputs.tag }}`
          "@ | Out-File -FilePath release_body.md -Encoding utf8
            exit 0
          }

          $section = $match.Value.Trim()
          Write-Host "Parsed $($section.Length) chars for version [$versionNumber]"

          # 提取日期
          $dateMatch = [regex]::Match($section, "##\s*\[[^\]]+\]\s*-\s*(\S+)")
          $date = if ($dateMatch.Success) { $dateMatch.Groups[1].Value } else { "---" }

          # 提取各类更新条目
          function Get-SectionItems($section, $heading) {
            $m = [regex]::Match($section, "(?s)###\s*$heading\s*\n(.*?)(?=###|\z)")
            if ($m.Success) {
              ($m.Groups[1].Value -split "`n" | Where-Object { $_ -match '^\s*-\s+' } | ForEach-Object { $_ -replace '^\s*-\s*', '' }).Trim()
            } else { @() }
          }

          $features = Get-SectionItems $section "新增功能"
          $improvements = Get-SectionItems $section "功能改进"
          $fixes = Get-SectionItems $section "问题修复"

          # 生成修复重点表
          $hasFixes = ($fixes.Count -gt 0)
          $severity = if ($hasFixes) { "中" } else { "低" }

          # 提取 Release 类型
          $releaseParts = $versionNumber -split '\.'
          $patch = [int]$releaseParts[2]
          $minor = [int]$releaseParts[1]
          $major = [int]$releaseParts[0]
          $releaseType = if ($patch -gt 0) { "Patch Release" } elseif ($minor -gt 0) { "Minor Release" } else { "Major Release" }

          # 从条目中提取修复重点表数据
          $fixTable = ""
          foreach ($fix in $fixes) {
            $cleanFix = $fix -replace '\*\*(.+?)\*\*.*', '$1'
            $shortFix = if ($cleanFix.Length -gt 60) { $cleanFix.Substring(0, 57) + "..." } else { $cleanFix }
            $range = "功能 / UI / 数据"
            $sev = if ($fix -match "崩溃|闪退|无法|失败|异常|不执行|缺失") { "高" } else { "中" }
            $fixTable += "| $sev | $shortFix | $range |`n"
          }
          foreach ($feat in $features) {
            $cleanFeat = $feat -replace '\*\*(.+?)\*\*.*', '$1'
            $shortFeat = if ($cleanFeat.Length -gt 60) { $cleanFeat.Substring(0, 57) + "..." } else { $cleanFeat }
            $fixTable += "| 低 | $shortFeat | UI / 配置 |`n"
          }

          # 修复项明细
          $detailItems = ""
          $allItems = $fixes + $improvements + $features
          $idx = 0
          foreach ($item in $allItems) {
            $idx++
            $clean = $item -replace '\*\*(.+?)\*\*', '**$1**'
            if ($clean.Length -gt 400) { $clean = $clean.Substring(0, 397) + "..." }
            $detailItems += "### ${idx}. $clean`n`n"
            $detailItems += "**根因**: 见 VERSION_LOG.md 完整说明。`n`n"
            $detailItems += "**修复**: 见 VERSION_LOG.md 完整说明。`n`n"
          }

          # 升级说明
          $upgradeNotes = ""
          if ($section -match "迁移|migrat|db.*→|rename") {
            $upgradeNotes = "5. 启动后会自动迁移旧 `toolkit.db` → 新 `app.db`（如存在）"
          }

          $body = @"
          # Toolkit $versionTag ($releaseType) — CI 自动构建版

          > 生成时间: ${{ github.event.head_commit.timestamp }}
          > 触发: ${{ github.event_name }}

          ## 修复重点

          | 严重度 | 修复项 | 影响范围 |
          |--------|--------|----------|
          $fixTable
          ## 完整修复说明

          $detailItems
          ## 下载

          `Toolkit_$versionTag.exe` (单文件可执行,无需 Python 环境)  
          适用于 Windows 10/11 x64

          ## 完整提交日志

          https://github.com/${{ github.repository }}/commits/$versionTag

          ## 升级说明

          1. 关闭旧版 Toolkit
          2. 备份 `data/app.db`（以防万一）
          3. 用新 exe 覆盖旧文件，或换个目录直接运行
          $upgradeNotes
          ---

          **此 Release 由 GitHub Actions 自动构建。**
          "@

          $body | Out-File -FilePath release_body.md -Encoding utf8
          Write-Host "Generated release body: $($body.Length) chars"
          Get-Content release_body.md | Select-Object -First 5

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Toolkit ${{ steps.tag.outputs.tag }}"
          body_path: release_body.md
          draft: false
          prerelease: false
          files: |
            dist/Toolkit_v*.exe
            dist/README.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
