# -*- coding: utf-8 -*-
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.5.0)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh   # PowerShell 7 跨平台稳定
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm toolkit.spec

      - name: Verify build
        run: |
          Get-ChildItem dist/
          $exe = Get-ChildItem dist/Toolkit_v*.exe -ErrorAction SilentlyContinue
          if (-not $exe) {
            Write-Error "Build failed: Toolkit_v*.exe not found"
            exit 1
          }
          Write-Host "Build verified: $($exe.Name) ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Toolkit_v*.exe
            dist/README.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
